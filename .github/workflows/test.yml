name: Test installer

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check documented bootstrap hash
        run: grep -F "$(sha256sum easytier-installer.sh | awk '{print $1}')  easytier-installer.sh" README.md
      - name: Bash syntax
        run: bash -n easytier-installer.sh tests/test_installer.sh
      - name: ShellCheck
        run: shellcheck -x easytier-installer.sh tests/test_installer.sh
      - name: Regression tests
        run: bash tests/test_installer.sh

  linux-integration:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install and start the real EasyTier release
        env:
          EASYTIER_VERSION: v2.6.4
        run: |
          python3 -m http.server 11211 --bind 127.0.0.1 >/tmp/easytier-port-blocker.log 2>&1 &
          blocker_pid=$!
          trap 'kill "$blocker_pid" 2>/dev/null || true' EXIT
          for attempt in {1..20}; do
            curl --disable --noproxy '*' -fsS "http://127.0.0.1:11211/" -o /dev/null && break
            sleep 0.1
          done
          {
            printf '\n%.0s' {1..6}
            printf '%s\n' 'tcp,udp,ws,wss,wg,quic,faketcp'
            printf '\n%.0s' {1..40}
          } | sudo --preserve-env=EASYTIER_VERSION bash ./easytier-installer.sh --install
          test "$(sudo cat /etc/easytier/management.mode)" = installer
          ! sudo grep -Fxq -- '--config-dir' /etc/easytier/config.args
          sudo grep -Fx '11212' /etc/easytier/web.args
          test "$(sudo awk 'previous == "--private-mode" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = true
          test "$(sudo awk 'previous == "--relay-network-whitelist" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = my-easytier
          test "$(sudo awk 'previous == "--relay-all-peer-rpc" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = false
      - name: Verify Core and Web services
        run: |
          sudo systemctl is-active --quiet easytier.service
          sudo systemctl is-active --quiet easytier-web.service
          test "$(sudo cat /etc/easytier/management.mode)" = installer
          test "$(sudo awk 'previous == "--private-mode" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = true
          test "$(sudo awk 'previous == "--relay-network-whitelist" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = my-easytier
          web_port=$(sudo awk 'previous == "--api-server-port" { print; exit } { previous=$0 }' /etc/easytier/web.args)
          curl --disable --noproxy '*' -fsS --connect-timeout 2 --max-time 5 \
            "http://127.0.0.1:${web_port}/api/v1/auth/captcha" -o /dev/null
      - name: Reset Web password without losing other data
        run: |
          db_fingerprint() {
            sudo python3 - <<'PY'
          import hashlib
          import sqlite3

          db = sqlite3.connect('/etc/easytier/web.db')
          snapshot = []
          for sql in (
              'SELECT id, username FROM users ORDER BY id',
              "SELECT id, username, password FROM users WHERE username <> 'admin' ORDER BY id",
              'SELECT * FROM groups ORDER BY id',
              'SELECT * FROM permissions ORDER BY id',
              'SELECT user_id, group_id FROM users_groups ORDER BY user_id, group_id',
              'SELECT group_id, permission_id FROM groups_permissions ORDER BY group_id, permission_id',
          ):
              snapshot.append(db.execute(sql).fetchall())
          config_columns = [
              row[1] for row in db.execute('PRAGMA table_info(user_running_network_configs)')
              if row[1] != 'update_time'
          ]
          quoted_columns = ', '.join(f'"{column}"' for column in config_columns)
          snapshot.append(db.execute(
              f'SELECT {quoted_columns} FROM user_running_network_configs ORDER BY id'
          ).fetchall())
          print(hashlib.sha256(repr(snapshot).encode()).hexdigest())
          PY
          }
          before_non_auth=$(db_fingerprint)
          printf '%s\n' 'Fixed_Web-Password:2026!' | sudo easytier-installer --reset-web-password
          after_non_auth=$(db_fingerprint)
          test "$before_non_auth" = "$after_non_auth"
          sudo systemctl is-active --quiet easytier.service
          sudo systemctl is-active --quiet easytier-web.service
          web_port=$(sudo awk 'previous == "--api-server-port" { print; exit } { previous=$0 }' /etc/easytier/web.args)
          new_hash=$(printf '%s' 'Fixed_Web-Password:2026!' | md5sum | awk '{print $1}')
          new_status=$(printf '{"username":"admin","password":"%s"}' "$new_hash" | \
            curl --disable --noproxy '*' -sS --connect-timeout 2 --max-time 8 \
              -H 'Content-Type: application/json' --data-binary @- -o /dev/null -w '%{http_code}' \
              "http://127.0.0.1:${web_port}/api/v1/auth/login")
          default_status=$(printf '{"username":"admin","password":"%s"}' '21232f297a57a5a743894a0e4a801fc3' | \
            curl --disable --noproxy '*' -sS --connect-timeout 2 --max-time 8 \
              -H 'Content-Type: application/json' --data-binary @- -o /dev/null -w '%{http_code}' \
              "http://127.0.0.1:${web_port}/api/v1/auth/login")
          test "$new_status" = 200
          test "$default_status" = 401
      - name: Verify installer-managed network is read-only in Web
        run: |
          export WEB_PORT
          WEB_PORT=$(sudo awk 'previous == "--api-server-port" { print; exit } { previous=$0 }' /etc/easytier/web.args)
          export MACHINE_ID
          MACHINE_ID=$(sudo cat /etc/easytier/machine-id)
          export INSTANCE_ID
          INSTANCE_ID=$(sudo /opt/easytier/easytier-cli -p 127.0.0.1:15888 -n easytier-oneclick node config | \
            awk -F '"' '/^[[:space:]]*instance_id[[:space:]]*=/ { print $2; exit }')
          test -n "$INSTANCE_ID"
          before_config=$(sudo /opt/easytier/easytier-cli -p 127.0.0.1:15888 -i "$INSTANCE_ID" node config)
          python3 - <<'PY'
          import hashlib
          import http.cookiejar
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          base = f"http://127.0.0.1:{os.environ['WEB_PORT']}/api/v1"
          machine_id = os.environ['MACHINE_ID']
          instance_id = os.environ['INSTANCE_ID']
          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(http.cookiejar.CookieJar())
          )

          def request(path, payload=None, method=None):
              body = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(
                  base + path,
                  data=body,
                  headers={'Content-Type': 'application/json'},
                  method=method,
              )
              with opener.open(req, timeout=8) as response:
                  raw = response.read()
                  return json.loads(raw) if raw else {}

          request('/auth/login', {
              'username': 'admin',
              'password': hashlib.md5(b'Fixed_Web-Password:2026!').hexdigest(),
          })
          last_error = None
          for _ in range(40):
              try:
                  metas = request(
                      f'/machines/{machine_id}/networks/metas',
                      {'instance_ids': [instance_id]},
                  )
                  permission = metas['metas'][instance_id]['config_permission']
                  assert permission == 3, permission
                  break
              except (AssertionError, KeyError, urllib.error.URLError) as error:
                  last_error = error
                  time.sleep(1)
          else:
              raise AssertionError(
                  f'installer-managed instance never reported config_permission=3: {last_error}'
              )

          request(
              f'/machines/{machine_id}/networks/{instance_id}',
              method='DELETE',
          )
          metas = request(
              f'/machines/{machine_id}/networks/metas',
              {'instance_ids': [instance_id]},
          )
          assert metas['metas'][instance_id]['config_permission'] == 3, metas
          PY
          after_config=$(sudo /opt/easytier/easytier-cli -p 127.0.0.1:15888 -i "$INSTANCE_ID" node config)
          test "$after_config" = "$before_config"
      - name: Reconfigure an existing installation as a shared relay
        run: printf '\n2\ny\n' | sudo easytier-installer --configure
      - name: Verify shared relay mode and services after reconfiguration
        if: always()
        run: |
          sudo systemctl status easytier-web.service --no-pager -l || true
          sudo journalctl -u easytier-web.service -n 100 --no-pager || true
          sudo systemctl status easytier.service --no-pager -l || true
          sudo journalctl -u easytier.service -n 100 --no-pager || true
          sudo systemctl is-active --quiet easytier.service
          sudo systemctl is-active --quiet easytier-web.service
          test "$(sudo awk 'previous == "--private-mode" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = false
          test "$(sudo awk 'previous == "--relay-network-whitelist" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = '*'
          test "$(sudo awk 'previous == "--relay-all-peer-rpc" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = false
          web_port=$(sudo awk 'previous == "--api-server-port" { print; exit } { previous=$0 }' /etc/easytier/web.args)
          new_hash=$(printf '%s' 'Fixed_Web-Password:2026!' | md5sum | awk '{print $1}')
          printf '{"username":"admin","password":"%s"}' "$new_hash" | \
            curl --disable --noproxy '*' -fsS --connect-timeout 2 --max-time 8 \
              -H 'Content-Type: application/json' --data-binary @- \
              "http://127.0.0.1:${web_port}/api/v1/auth/login" -o /dev/null
      - name: Switch the existing host to Web-managed mode
        run: |
          printf '2\n\n\n\n\n\n' | sudo easytier-installer --configure
          test "$(sudo cat /etc/easytier/management.mode)" = web
          sudo grep -Fxq -- '--daemon' /etc/easytier/config.args
          test "$(sudo awk 'previous == "--config-dir" { print; exit } { previous=$0 }' /etc/easytier/config.args)" = /etc/easytier/networks
          for forbidden in --instance-name --network-name --network-secret --hostname --dhcp --ipv4 --listeners --peers --private-mode; do
            ! sudo grep -Fxq -- "$forbidden" /etc/easytier/config.args
          done
          instance_id=$(sudo cat /etc/easytier/managed-instance-id)
          sudo test -s "/etc/easytier/networks/${instance_id}.toml"
          sudo systemctl is-active --quiet easytier.service
          sudo systemctl is-active --quiet easytier-web.service
      - name: Edit through Web API and verify persistence after restart
        run: |
          export WEB_PORT
          WEB_PORT=$(sudo awk 'previous == "--api-server-port" { print; exit } { previous=$0 }' /etc/easytier/web.args)
          export MACHINE_ID
          MACHINE_ID=$(sudo cat /etc/easytier/machine-id)
          export INSTANCE_ID
          INSTANCE_ID=$(sudo cat /etc/easytier/managed-instance-id)
          python3 - <<'PY'
          import hashlib
          import http.cookiejar
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          base = f"http://127.0.0.1:{os.environ['WEB_PORT']}/api/v1"
          machine_id = os.environ['MACHINE_ID']
          instance_id = os.environ['INSTANCE_ID']
          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(http.cookiejar.CookieJar())
          )

          def request(path, payload=None):
              body = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(
                  base + path,
                  data=body,
                  headers={'Content-Type': 'application/json'},
              )
              with opener.open(req, timeout=8) as response:
                  raw = response.read()
                  return json.loads(raw) if raw else {}

          request('/auth/login', {
              'username': 'admin',
              'password': hashlib.md5(b'Fixed_Web-Password:2026!').hexdigest(),
          })
          last_error = None
          for _ in range(40):
              try:
                  metas = request(
                      f'/machines/{machine_id}/networks/metas',
                      {'instance_ids': [instance_id]},
                  )
                  permission = metas['metas'][instance_id]['config_permission']
                  assert permission == 0, permission
                  config = request(
                      f'/machines/{machine_id}/networks/config/{instance_id}'
                  )
                  break
              except (AssertionError, KeyError, urllib.error.URLError) as error:
                  last_error = error
                  time.sleep(1)
          else:
              raise AssertionError(
                  f'web-managed instance never reported config_permission=0: {last_error}'
              )

          config['hostname'] = 'web-managed-ci'
          config['listener_urls'] = [
              'tcp://0.0.0.0:19131',
              'udp://0.0.0.0:19132',
          ]
          request(
              f'/machines/{machine_id}/networks',
              {'config': config, 'save': True},
          )

          for _ in range(30):
              current = request(
                  f'/machines/{machine_id}/networks/config/{instance_id}'
              )
              if (
                  current.get('hostname') == 'web-managed-ci'
                  and current.get('listener_urls') == config['listener_urls']
              ):
                  break
              time.sleep(1)
          else:
              raise AssertionError('POST /networks save=true did not update the running config')
          PY

          sudo grep -F 'hostname = "web-managed-ci"' "/etc/easytier/networks/${INSTANCE_ID}.toml"
          sudo grep -F 'tcp://0.0.0.0:19131' "/etc/easytier/networks/${INSTANCE_ID}.toml"
          sudo grep -F 'udp://0.0.0.0:19132' "/etc/easytier/networks/${INSTANCE_ID}.toml"

          sudo systemctl stop easytier.service
          sudo systemctl restart easytier-web.service
          for _attempt in {1..30}; do
            curl --disable --noproxy '*' -fsS --connect-timeout 2 --max-time 5 \
              "http://127.0.0.1:${WEB_PORT}/api/v1/auth/captcha" -o /dev/null && break
            sleep 1
          done
          sudo systemctl start easytier.service
          for _attempt in {1..30}; do
            sudo systemctl is-active --quiet easytier.service && break
            sleep 1
          done
          sudo systemctl is-active --quiet easytier.service
          sudo systemctl is-active --quiet easytier-web.service

          python3 - <<'PY'
          import hashlib
          import http.cookiejar
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          base = f"http://127.0.0.1:{os.environ['WEB_PORT']}/api/v1"
          machine_id = os.environ['MACHINE_ID']
          instance_id = os.environ['INSTANCE_ID']
          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(http.cookiejar.CookieJar())
          )

          def request(path, payload=None):
              body = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(
                  base + path,
                  data=body,
                  headers={'Content-Type': 'application/json'},
              )
              with opener.open(req, timeout=8) as response:
                  raw = response.read()
                  return json.loads(raw) if raw else {}

          last_error = None
          for _ in range(45):
              try:
                  request('/auth/login', {
                      'username': 'admin',
                      'password': hashlib.md5(b'Fixed_Web-Password:2026!').hexdigest(),
                  })
                  metas = request(
                      f'/machines/{machine_id}/networks/metas',
                      {'instance_ids': [instance_id]},
                  )
                  assert metas['metas'][instance_id]['config_permission'] == 0
                  config = request(
                      f'/machines/{machine_id}/networks/config/{instance_id}'
                  )
                  assert config.get('hostname') == 'web-managed-ci', config
                  assert config.get('listener_urls') == [
                      'tcp://0.0.0.0:19131',
                      'udp://0.0.0.0:19132',
                  ], config
                  break
              except (AssertionError, KeyError, urllib.error.URLError) as error:
                  last_error = error
                  time.sleep(1)
          else:
              raise AssertionError(
                  f'Web edit was not writable and persistent after restart: {last_error}'
              )
          PY

          sudo grep -F 'hostname = "web-managed-ci"' "/etc/easytier/networks/${INSTANCE_ID}.toml"
          sudo grep -F 'tcp://0.0.0.0:19131' "/etc/easytier/networks/${INSTANCE_ID}.toml"
          sudo grep -F 'udp://0.0.0.0:19132' "/etc/easytier/networks/${INSTANCE_ID}.toml"
      - name: Allow an intentionally empty Web-managed host
        run: |
          export WEB_PORT
          WEB_PORT=$(sudo awk 'previous == "--api-server-port" { print; exit } { previous=$0 }' /etc/easytier/web.args)
          export MACHINE_ID
          MACHINE_ID=$(sudo cat /etc/easytier/machine-id)
          export INSTANCE_ID
          INSTANCE_ID=$(sudo cat /etc/easytier/managed-instance-id)
          python3 - <<'PY'
          import hashlib
          import http.cookiejar
          import json
          import os
          import urllib.request

          base = f"http://127.0.0.1:{os.environ['WEB_PORT']}/api/v1"
          machine_id = os.environ['MACHINE_ID']
          instance_id = os.environ['INSTANCE_ID']
          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(http.cookiejar.CookieJar())
          )

          def request(path, payload=None, method=None):
              body = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(
                  base + path,
                  data=body,
                  method=method,
                  headers={'Content-Type': 'application/json'},
              )
              with opener.open(req, timeout=8) as response:
                  raw = response.read()
                  return json.loads(raw) if raw else {}

          request('/auth/login', {
              'username': 'admin',
              'password': hashlib.md5(b'Fixed_Web-Password:2026!').hexdigest(),
          })
          request(
              f'/machines/{machine_id}/networks/{instance_id}',
              method='DELETE',
          )
          PY

          for attempt in {1..30}; do
            sudo test ! -e "/etc/easytier/networks/${INSTANCE_ID}.toml" && break
            sleep 1
          done
          sudo test ! -e "/etc/easytier/networks/${INSTANCE_ID}.toml"
          if sudo /opt/easytier/easytier-cli -p 127.0.0.1:15888 node >/tmp/empty-node.out 2>&1; then
            echo 'expected an empty Web-managed host' >&2
            exit 1
          fi
          grep -F 'no running instances found' /tmp/empty-node.out

          printf '\n%.0s' {1..6} | sudo easytier-installer --configure
          test "$(sudo cat /etc/easytier/management.mode)" = web
          sudo systemctl is-active --quiet easytier.service
          sudo systemctl is-active --quiet easytier-web.service
          ! sudo find /etc/easytier/networks -maxdepth 1 -type f -name '*.toml' -print -quit | grep -q .
      - name: Show integration diagnostics on failure
        if: failure()
        run: |
          sudo systemctl status easytier-web.service --no-pager -l || true
          sudo journalctl -u easytier-web.service -n 150 --no-pager || true
          sudo systemctl status easytier.service --no-pager -l || true
          sudo journalctl -u easytier.service -n 150 --no-pager || true
          sudo find /etc/easytier -maxdepth 2 -type f -printf '%m %p\n' 2>/dev/null || true
